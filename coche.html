<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Control Vehículos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0B0F14;--bg-page:#070A0E;
  --surface:#121821;--surface2:#18202B;--surface3:#1E2836;
  --border:#26313D;--border2:rgba(38,49,61,0.72);
  --text:#F2F5F7;--text2:#E6EBEF;--text3:#C8D0D8;
  --accent:#2F80A8;--accent-h:#3A92BD;--accent-s:rgba(47,128,168,0.18);
  --red:#FC8181;--red-bg:rgba(197,48,48,0.16);
  --green:#68D391;--green-bg:rgba(56,161,105,0.16);
  --amber:#E0B15A;--amber-bg:rgba(214,158,46,0.16);
  --neutral:#CBD5E0;--neutral-bg:rgba(160,174,192,0.14);
  --font:-apple-system,'SF Pro Text','Inter',system-ui,sans-serif;--mono:-apple-system,'SF Mono','Inter',system-ui,sans-serif;
  --r:20px;--r-sm:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:radial-gradient(circle at top,#13202B 0%,#0B0F14 42%,#070A0E 100%);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:100px}
/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:#090D12;border-top:1px solid var(--border);display:none;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 4px 10px;background:none;border:none;color:var(--text3);font-family:var(--font);font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;border-radius:0}
.nav-btn.active{color:var(--text);background:var(--accent-s);border-top:2px solid var(--accent)}
.nav-btn svg{width:22px;height:22px}
/* HEADER */
.header{padding:56px 20px 20px;background:linear-gradient(180deg,#121A24 0%,#0B0F14 100%);border-bottom:1px solid var(--border)}
.header-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:4px;font-weight:600}
.header-title{font-size:30px;font-weight:300;letter-spacing:-.03em;color:var(--text)}
.header-title span{color:var(--text2)}
.header-sub{display:inline-block;margin-top:8px;padding:6px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;font-size:12px;color:var(--text2);letter-spacing:.02em}
/* SECTION TITLES - unified */
.section-title{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);font-weight:500;margin:20px 0 10px}
.page-inicio .section-title,.page-revisiones .section-title,.page-combustible .section-title,.page-adblue .section-title,.page-aditivos .section-title{color:var(--text3)}
.page-inicio .header-title span,.page-revisiones .header-title span,.page-combustible .header-title span,.page-adblue .header-title span,.page-aditivos .header-title span{color:var(--text2)}
/* PAGES */
.page{display:none}.page.active{display:block}
.content{padding:20px}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:0 14px 40px rgba(0,0,0,0.22)}
.total-bubble{border:1.5px solid var(--accent);box-shadow:0 14px 40px rgba(0,0,0,0.22),0 0 0 1px var(--accent-s)}
.total-general{border:1.5px solid var(--accent);box-shadow:0 14px 40px rgba(0,0,0,0.22),0 0 0 1px var(--accent-s)}
.card-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;font-weight:500}
.card-value{font-size:24px;font-weight:400;font-family:var(--mono);color:var(--text)}
.card-value.accent{color:var(--accent)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
/* CYCLE */
.cycle-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:0 14px 40px rgba(0,0,0,0.22)}
.cycle-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;font-weight:500}
.cycle-steps{display:flex;gap:8px}
.cycle-step{flex:1;height:40px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--border);color:var(--text3);background:var(--surface2);transition:all .25s}
.cycle-step.done{background:var(--surface3);border-color:var(--border);color:var(--text2)}
.cycle-step.current{background:var(--accent);border-color:var(--accent);color:#fff;font-size:12px}
.cycle-step.prem.done{background:rgba(214,158,46,0.12);border-color:rgba(214,158,46,0.3);color:var(--amber)}
.cycle-step.prem.current{background:var(--amber);border-color:var(--amber);color:#000}
.cycle-next{margin-top:10px;font-size:15px;color:var(--text2)}
.cycle-next strong{color:var(--text)}
/* LIST */
.list-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;box-shadow:0 14px 40px rgba(0,0,0,0.22)}
.li-left{flex:1;min-width:0}
.li-date{font-size:12px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.li-title{font-size:15px;font-weight:400;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:14px;color:var(--text2);margin-top:2px}
.li-right{text-align:right;flex-shrink:0}
.li-price{font-size:16px;font-family:var(--mono);font-weight:500;color:var(--text)}
.li-actions{display:flex;gap:8px;margin-top:5px;justify-content:flex-end}
.btn-act{background:none;border:none;cursor:pointer;padding:3px 6px;color:var(--text3);font-size:13px;font-family:var(--font);border-radius:4px;transition:all .15s}
.btn-act:active{color:var(--text2);background:var(--surface2)}
.btn-del:active{color:var(--red)}
/* BADGE */
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.badge-n{background:var(--neutral-bg);color:var(--neutral);border:1px solid rgba(160,174,192,0.2)}
.badge-p{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(214,158,46,0.25)}
/* MISC */
.totals-row{background:var(--surface);border:1.5px solid var(--accent);border-radius:var(--r);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;box-shadow:0 14px 40px rgba(0,0,0,0.22),0 0 0 1px var(--accent-s)}
.tr-label{font-size:14px;color:var(--text2)}
.tr-value{font-size:18px;font-family:var(--mono);font-weight:500;color:var(--text)}
.last-rec{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.km-since{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.km-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;font-weight:500}
.km-value{font-size:22px;font-family:var(--mono);color:var(--accent)}
.km-sub{font-size:13px;color:var(--text3);margin-top:2px}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:15px}
/* FAB */
.fab{position:fixed;bottom:70px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(47,128,168,.4);z-index:99;transition:transform .2s}
.fab:active{transform:scale(.93)}
.fab svg{width:24px;height:24px;color:#fff}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{width:100%;background:var(--surface);border-radius:var(--r) var(--r) 0 0;border-top:1px solid var(--border);padding:20px 20px calc(24px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:17px;font-weight:500;margin-bottom:18px;color:var(--text)}
/* FORM */
.fg{margin-bottom:14px}
.fl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:500;margin-bottom:6px;display:block}
.fi{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:13px 14px;color:var(--text);font-family:var(--font);font-size:17px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,128,168,0.18)}
.fi::placeholder{color:var(--text3)}
/* TYPE SELECTOR */
.type-sel{display:flex;gap:8px;margin-bottom:14px}
.type-btn{flex:1;padding:13px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:var(--font);font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;text-align:center}
.type-btn.sel-n{background:var(--surface3);border-color:var(--text2);color:var(--text)}
.type-btn.sel-p{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
/* SAVE BTN */
.btn-save{width:100%;padding:14px;background:var(--accent);border:1px solid rgba(47,128,168,0.4);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:all .2s}
.btn-save:hover{background:var(--accent-h)}
.btn-save:active{opacity:.7}
/* PICKER */
.picker-btn{width:100%;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:15px;cursor:pointer;text-align:left;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:border-color .2s}
.picker-btn:active{border-color:var(--accent)}
/* ADITIVOS */
.badge-adv{background:var(--neutral-bg);color:var(--neutral);border:1px solid rgba(160,174,192,0.2)}
.badge-dpf{background:var(--accent-s);color:var(--accent);border:1px solid rgba(47,128,168,0.3)}
.badge-st{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.badge-pendiente{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(214,158,46,0.25)}
.badge-aplicado{background:var(--green-bg);color:var(--green);border:1px solid rgba(56,161,105,0.25)}
.badge-completado{background:var(--neutral-bg);color:var(--neutral);border:1px solid rgba(160,174,192,0.2)}
.badge-saltado{background:var(--neutral-bg);color:var(--neutral);border:1px solid rgba(160,174,192,0.2)}
.adit-next{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:0 14px 40px rgba(0,0,0,0.22)}
.adit-next-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;font-weight:500}
.adit-next-product{font-size:17px;font-weight:400;color:var(--text);margin-bottom:4px}
.adit-next-detail{font-size:13px;color:var(--text3);line-height:1.5}
.adit-cal-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border2)}
.adit-cal-row:last-child{border-bottom:none}
.adit-cal-mes{font-size:14px;font-weight:500;color:var(--text);min-width:60px}
.adit-cal-prod{font-size:13px;color:var(--text2);flex:1;margin:0 12px}
.adit-rules{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;font-size:12px;color:var(--text3);line-height:1.7;box-shadow:0 14px 40px rgba(0,0,0,0.22)}
.adit-rules strong{color:var(--text2);font-weight:500}

/* VEHICLE SELECTOR */
.selector-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.selector-title{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;font-weight:600}
.selector-heading{font-size:30px;font-weight:300;letter-spacing:-.03em;color:var(--text);margin-bottom:32px}
.vehicle-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:14px;cursor:pointer;transition:all .2s;box-shadow:0 14px 40px rgba(0,0,0,0.22);text-align:center}
.vehicle-card.jaguar-card{border:2px solid #2F80A8}
.vehicle-card.honda-card{border:2px solid #D8A21B}
.vehicle-card:active{transform:scale(.98)}
.vehicle-card:hover{filter:brightness(1.08)}
.vc-name{font-size:20px;font-weight:600;color:var(--text);letter-spacing:.04em;text-transform:uppercase;margin-bottom:0}
.vc-type{font-size:13px;color:var(--text3);margin-bottom:8px}
.vc-sub{display:inline-block;padding:4px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;font-size:11px;color:var(--text2)}
.vc-accent{width:40px;height:4px;border-radius:2px;margin-bottom:12px}
.change-vehicle{background:var(--surface2);border:1px solid var(--border);border-radius:999px;color:var(--text2);font-size:12px;cursor:pointer;padding:7px 12px;font-family:var(--font);letter-spacing:.04em}
.change-vehicle:active{color:var(--text2)}
/* Honda accent override */
body.honda{--accent:#D8A21B;--accent-h:#F0B429;--accent-s:rgba(216,162,27,0.18)}
body.honda .fab{box-shadow:0 4px 20px rgba(216,162,27,.4)}
body.honda .fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(216,162,27,0.18)}
body.honda .btn-save{background:var(--accent);border-color:rgba(216,162,27,0.4)}
/* UTILIDADES / BACKUP */
.selector-tools{width:100%;max-width:360px;margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tool-btn{background:var(--surface2);border:1px solid var(--border);border-radius:999px;color:var(--text2);font-family:var(--font);font-size:12px;padding:10px 12px;cursor:pointer;letter-spacing:.03em}
.tool-btn:active{border-color:var(--accent);color:var(--text)}
.sync-line{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;line-height:1.4}
.update-line{font-size:11px;color:var(--text3);text-align:center;margin-top:16px;line-height:1.4}
.total-bubble,.total-general,.totals-row{border-color:var(--accent);box-shadow:0 14px 40px rgba(0,0,0,0.22),0 0 0 1px var(--accent-s)}

</style>
</head>
<body>

<div id="vehicle-selector" class="selector-screen">
  <div class="selector-title">Control vehículos</div>
  <div class="selector-heading">Selecciona vehículo</div>
  <div class="vehicle-card jaguar-card" onclick="selectVehicle('jaguar')">
    <div class="vc-name">JAGUAR F-PACE (2016)</div>
  </div>
  <div class="vehicle-card honda-card" onclick="selectVehicle('honda')">
    <div class="vc-name">HONDA ADV-350 (2024)</div>
  </div>
  <div class="selector-tools">
    <button class="tool-btn" onclick="exportData()">Exportar datos</button>
    <button class="tool-btn" onclick="triggerImport()">Importar datos</button>
  </div>
  <input type="file" id="import-file" accept="application/json" style="display:none" onchange="importData(event)">
  <div class="sync-line" id="selector-sync"></div>
</div>


<div id="p-inicio" class="page page-inicio active">
  <div class="header"><div class="header-label">Control vehículo</div><div class="header-title">Jaguar <span>F-Pace</span></div><div class="header-sub">7495 JRG · 2.0D Ingenium</div></div><div style="padding:4px 20px 0"><button class="change-vehicle" onclick="backToSelector()">← Cambiar vehículo</button></div>
  <div class="content" id="c-inicio"></div>
</div>
<div id="p-revisiones" class="page page-revisiones">
  <div class="header"><div class="header-title">Revisiones</div></div><div style="padding:4px 20px 0"><button class="change-vehicle" onclick="backToSelector()">← Cambiar vehículo</button></div>
  <div class="content" id="c-revisiones"></div>
</div>
<div id="p-combustible" class="page page-combustible">
  <div class="header"><div class="header-title">Combustible</div></div><div style="padding:4px 20px 0"><button class="change-vehicle" onclick="backToSelector()">← Cambiar vehículo</button></div>
  <div class="content" id="c-combustible"></div>
</div>

<div id="p-aditivos" class="page page-aditivos">
  <div class="header"><div class="header-title">Aditivos <span>DPF</span></div></div><div style="padding:4px 20px 0"><button class="change-vehicle" onclick="backToSelector()">← Cambiar vehículo</button></div>
  <div class="content" id="c-aditivos"></div>
</div>


<div id="p-h-inicio" class="page page-inicio">
  <div class="header"><div class="header-label">Control vehículo</div><div class="header-title">Honda <span>ADV</span></div><div class="header-sub">Moto · Gasolina</div></div>
  <div style="padding:4px 20px 0"><button class="change-vehicle" onclick="backToSelector()">← Cambiar vehículo</button></div>
  <div class="content" id="c-h-inicio"></div>
</div>
<div id="p-h-combustible" class="page page-combustible">
  <div class="header"><div class="header-title">Combustible</div></div><div style="padding:4px 20px 0"><button class="change-vehicle" onclick="backToSelector()">← Cambiar vehículo</button></div>
  <div class="content" id="c-h-combustible"></div>
</div>
<div id="p-h-revisiones" class="page page-revisiones">
  <div class="header"><div class="header-title">Revisiones</div></div><div style="padding:4px 20px 0"><button class="change-vehicle" onclick="backToSelector()">← Cambiar vehículo</button></div>
  <div class="content" id="c-h-revisiones"></div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="go('inicio')" id="n-inicio">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio
  </button>
  <button class="nav-btn" onclick="go('revisiones')" id="n-revisiones">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>Revisiones
  </button>
  <button class="nav-btn" onclick="go('combustible')" id="n-combustible">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 22V8a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v14"/><path d="M3 22h10M13 10h2a2 2 0 0 1 2 2v2"/><path d="M17 14v4a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-7l-2-3"/><line x1="3" y1="14" x2="13" y2="14"/></svg>Combustible

function nid(a) { return a.length>0?Math.max(...a.map(x=>x.id))+1:1; }

// ── CYCLE ─────────────────────────────────────────────────────────────────────
// Cycle is determined by ordering combustible by fecha+id and computing position
function getCycle() {
  const sorted = [...D.combustible].sort((a,b)=>{
    const da=a.fecha||'', db=b.fecha||'';
    return da<db?-1:da>db?1:a.id-b.id;
  });
  // Count deposits since the last premium (premium resets the cycle)
  let countSincePremium = 0;
  for (let i = sorted.length - 1; i >= 0; i--) {
    if (sorted[i].tipo === 'premium') break;
    countSincePremium++;
  }
  const pos = countSincePremium % 4; // 0=just did premium or start, 1=did 1 normal...
  const done = pos;
  const nextType = pos === 3 ? 'premium' : 'normal';
  return { done, nextType, total: sorted.length };
}

}

// ── CYCLE WIDGET ──────────────────────────────────────────────────────────────
function cycleWidget(c) {
  const labels=['N','N','N','P'], prem=[0,0,0,1];
  let s='';
  for(let i=0;i<4;i++){
    let cls='cycle-step'+(prem[i]?' prem':'');
    if(i<c.done) cls+=' done'; else if(i===c.done) cls+=' current';
    s+=`<div class="${cls}">${labels[i]}</div>`;
  }
  return `<div class="cycle-card">
    <div class="cycle-label">Ciclo combustible · Depósito ${c.done+1} de 4</div>
    <div class="cycle-steps">${s}</div>
    <div class="cycle-next">Próximo: <strong>Diésel ${c.nextType==='premium'?'Premium':'Normal'}</strong></div>
  </div>`;
}

  const tN=D.combustible.filter(x=>x.tipo==='normal').reduce((s,x)=>s+x.importe,0);

  let h=`${cycleWidget(cycle)}

    <div class="li-left">

      <div class="li-title"><span class="badge ${r.tipo==='premium'?'badge-p':'badge-n'}">${r.tipo==='premium'?'Premium':'Normal'}</span></div>

      </div>
    </div>
  </div>`;});

  const adSorted=[...D.adblue].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  let kmH='';
  if(adSorted.length>0){
    const lastKm=adSorted[0].km;

  h+=`<div class="section-title">AdBlue</div>${kmH}

const PAUTA_ANUAL = [
  {mes:0,mesNombre:'Enero',producto:'advanced',nombre:'Forté Advanced Formula Diesel Treatment',prioridad:'Media',motivo:'Limpieza/mantenimiento general tras cierre de año'},
  {mes:3,mesNombre:'Abril',producto:'dpf',nombre:'Forté DPF Cleaner & Regenerator',prioridad:'Alta',motivo:'Apoyo al FAP tras invierno y uso urbano/corto'},
  {mes:6,mesNombre:'Julio',producto:'advanced',nombre:'Forté Advanced Formula Diesel Treatment',prioridad:'Alta',motivo:'Preparar sistema diésel antes del uso intensivo de verano'},
  {mes:7,mesNombre:'Agosto',producto:'dpf',nombre:'Forté DPF Cleaner & Regenerator',prioridad:'Alta',motivo:'Mejor momento del año: viajes, más km, más temperatura sostenida'},
  {mes:11,mesNombre:'Diciembre',producto:'dpf',nombre:'Forté DPF Cleaner & Regenerator',prioridad:'Media',motivo:'Apoyo preventivo tras uso urbano y antes de trayectos navidad'},
];

function aditRequiereSeparacion(){
  const a=D.aditivos||[];if(!a.length)return false;
  const last=[...a].sort((x,y)=>y.fecha.localeCompare(x.fecha))[0];
  const after=[...D.combustible].filter(c=>c.fecha>last.fecha).length;
  return after<1;
}
function getProximoAditivo(){
  const m=new Date().getMonth(),y=new Date().getFullYear(),a=D.aditivos||[];
  for(const p of PAUTA_ANUAL){
    if(p.mes<m)continue;
    if(!a.find(x=>{const d=new Date(x.fecha);return d.getFullYear()===y&&d.getMonth()===p.mes&&(x.estado==='Aplicado'||x.estado==='Completado');}))return p;
  }
  return PAUTA_ANUAL[0];
}
function getAditEstado(r){
  if(!r)return'';
  const after=[...D.combustible].filter(c=>c.fecha>r.fecha).length;
  if(after>=1)return'Completado';
  return r.estado||'Aplicado';
}

function rAditivos(){
  const aditivos=D.aditivos||[],prox=getProximoAditivo(),sepReq=aditRequiereSeparacion(),curYear=new Date().getFullYear(),curMonth=new Date().getMonth();
  let h='';
  h+=`<div class="adit-next"><div class="adit-next-label">Próximo aditivo recomendado</div><div class="adit-next-product">${prox.mesNombre} — ${prox.nombre}</div><div class="adit-next-detail">Prioridad: <span style="color:${prox.prioridad==='Alta'?'var(--red)':'var(--accent)'}"> ${prox.prioridad}</span><br>${prox.motivo}<br>${sepReq?'<span style="color:var(--red)">⚠ Registra 1 depósito sin aditivo antes</span>':'Después: dejar 1 depósito sin aditivo'}</div></div>`;
  h+=`<div class="adit-rules"><strong>Advanced</strong> = mantenimiento general diésel/inyección/combustión.<br><strong>DPF</strong> = apoyo específico FAP/DPF/regeneración.<br>No usar ambos en el mismo depósito.<br>Después de cada aditivo, dejar 1 depósito completo sin aditivo.<br>DPF solo tiene sentido si después habrá carretera y trayectos largos.</div>`;
  h+=`<div class="section-title">Calendario ${curYear}</div><div class="card" style="padding:12px 16px">`;
  PAUTA_ANUAL.forEach(p=>{
    const done=aditivos.find(a=>{const d=new Date(a.fecha);return d.getFullYear()===curYear&&d.getMonth()===p.mes&&(a.estado==='Aplicado'||a.estado==='Completado');});
    const saltado=aditivos.find(a=>{const d=new Date(a.fecha);return d.getFullYear()===curYear&&d.getMonth()===p.mes&&a.estado==='Saltado';});
    let sb='';
    if(done)sb='<span class="badge-st badge-aplicado">Aplicado</span>';
    else if(saltado)sb='<span class="badge-st badge-saltado">Saltado</span>';
    else sb=`<span class="badge-st badge-pendiente">Pendiente</span>`;
    h+=`<div class="adit-cal-row"><div class="adit-cal-mes">${p.mesNombre}</div><div class="adit-cal-prod">${p.producto==='advanced'?'Advanced':'DPF Cleaner'}</div><div class="adit-cal-prio ${p.prioridad.toLowerCase()}">${p.prioridad}</div>${sb}</div>`;
  });
  h+=`</div>`;
  if(curMonth>=5&&curMonth<=7){h+=`<div class="card" style="border-color:#3d2e00;margin-top:10px"><div class="card-label" style="color:var(--accent)">Pauta verano</div><div style="font-size:13px;color:var(--text2);line-height:1.6">Advanced en julio → 1 depósito sin aditivo → DPF en agosto antes de viaje largo.</div></div>`;}
  const sorted=[...aditivos].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  h+=`<div class="section-title">${sorted.length} registros</div>`;
  if(!sorted.length)h+=`<div class="empty">Sin registros de aditivos. Pulsa + para añadir.</div>`;
  else sorted.forEach(r=>{
    const estado=getAditEstado(r),isProd=r.producto==='advanced';
    h+=`<div class="list-item"><div class="li-left"><div class="li-date">${fd(r.fecha)}${r.km?' · '+fk(r.km):''}</div><div class="li-title"><span class="badge ${isProd?'badge-adv':'badge-dpf'}">${isProd?'Advanced':'DPF Cleaner'}</span></div>${r.usoPosterior?`<div class="li-sub">Uso: ${r.usoPosterior}</div>`:''}${r.motivo?`<div class="li-sub" style="color:var(--text3)">${r.motivo}</div>`:''}</div><div class="li-right"><div class="li-price">${fe(r.precioProducto||0)}</div><div style="margin-top:4px"><span class="badge-st badge-${estado.toLowerCase()}">${estado}</span></div><div class="li-actions"><button class="btn-act" onclick="editAdit(${r.id})">Editar</button><button class="btn-act btn-del" onclick="delAdit(${r.id})">Borrar</button></div></div></div>`;
  });
  const costeAnual=aditivos.filter(a=>new Date(a.fecha).getFullYear()===curYear).reduce((s,x)=>s+(x.precioProducto||0),0);
  if(costeAnual>0)h+=`<div class="totals-row" style="margin-top:10px"><span class="tr-label">Coste aditivos ${curYear}</span><span class="tr-value">${fe(costeAnual)}</span></div>`;
  document.getElementById('c-aditivos').innerHTML=h;
}

  const total=DH.combustible.reduce((s,x)=>s+(x.importe||0),0);
  let h=`<div class="totals-row"><span class="tr-label">Total combustible</span><span class="tr-value">${fe(total)}</span></div>
  <div class="section-title">${sorted.length} repostajes</div>`;
  if(!sorted.length) h+=`<div class="empty">Sin repostajes. Pulsa + para añadir.</div>`;
  else sorted.forEach(r=>{h+=`<div class="list-item">
    <div class="li-left">
      <div class="li-date">${fd(r.fecha)}</div>
      <div class="li-title">Gasolina</div>
      ${r.notas?`<div class="li-sub">${r.notas}</div>`:''}
    </div>
    <div class="li-right">
      <div class="li-price">${fe(r.importe)}</div>
      <div class="li-actions">
        <button class="btn-act" onclick="editHondaComb(${r.id})">Editar</button>
        <button class="btn-act btn-del" onclick="delHondaComb(${r.id})">Borrar</button>
      </div>
    </div>
  </div>`;});
  document.getElementById('c-h-combustible').innerHTML=h;
}

function rHondaRevisiones() {
  const sorted=[...DH.revisiones].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const total=DH.revisiones.reduce((s,x)=>s+(x.precio||0),0);
  let h=`<div class="totals-row"><span class="tr-label">Total revisiones</span><span class="tr-value">${fe(total)}</span></div>
  <div class="section-title">${sorted.length} registros</div>`;
  if(!sorted.length) h+=`<div class="empty">Sin revisiones. Pulsa + para añadir.</div>`;
  else sorted.forEach(r=>{h+=`<div class="list-item">
    <div class="li-left">
      <div class="li-date">${fd(r.fecha)}${r.km?' · '+fk(r.km):''}</div>
      <div class="li-title">${r.taller||'Revisión'}</div>
      ${r.notas?`<div class="li-sub">${r.notas}</div>`:''}
    </div>
    <div class="li-right">
      <div class="li-price">${fe(r.precio)}</div>
      <div class="li-actions">
        <button class="btn-act" onclick="editHondaRev(${r.id})">Editar</button>
        <button class="btn-act btn-del" onclick="delHondaRev(${r.id})">Borrar</button>
      </div>
    </div>
  </div>`;});
  document.getElementById('c-h-revisiones').innerHTML=h;
}

// Honda forms
function openHondaPicker(){
  document.getElementById('modal-title').textContent='¿Qué quieres añadir?';
  document.getElementById('modal-body').innerHTML=`
    <button class="picker-btn" onclick="showHondaCombForm(null)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="1.6" stroke-linecap="round"><path d="M3 22V8a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v14"/><path d="M3 22h10"/><path d="M17 14v4a1 1 0 0 0 1 1h1a1 1 0 0 0 1-1v-7l-2-3"/><line x1="3" y1="14" x2="13" y2="14"/></svg>
      Repostaje gasolina
    </button>
    <button class="picker-btn" onclick="showHondaRevForm(null)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="1.6" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      Revisión
    </button>`;
  openModal();
}

function showHondaCombForm(c){
  document.getElementById('modal-title').textContent=c?'Editar repostaje':'Nuevo repostaje';
  document.getElementById('modal-body').innerHTML=`
    <div class="fg"><label class="fl">Fecha</label><input class="fi" type="date" id="ff" value="${c?c.fecha:tod()}"></div>
    <div class="fg"><label class="fl">Importe (€)</label><input class="fi" type="number" step="0.01" id="fi2" placeholder="0,00" value="${c?c.importe:''}"></div>
    <div class="fg"><label class="fl">Observaciones <span style="color:var(--text3)">(opcional)</span></label><input class="fi" type="text" id="fn" value="${c?c.notas||'':''}"></div>
    <button class="btn-save" onclick="saveHondaComb()">Guardar</button>`;
  openModal();
}

function saveHondaComb(){
  const f=v('ff'),im=parseFloat(v('fi2')),n=v('fn').trim();
  if(!f||!im){alert('Fecha e importe son obligatorios.');return;}
  const obj={id:editId||nid(DH.combustible),fecha:f,importe:im,notas:n};
  if(editId){const i=DH.combustible.findIndex(x=>x.id===editId);if(i>=0)DH.combustible[i]=obj;}
  else DH.combustible.push(obj);
  dbSave();closeModal();render(curPage);
}
function editHondaComb(id){editId=id;showHondaCombForm(DH.combustible.find(x=>x.id===id));}
function delHondaComb(id){if(!confirm('¿Borrar este repostaje?'))return;DH.combustible=DH.combustible.filter(x=>x.id!==id);dbSave();render(curPage);}

function showHondaRevForm(r){
  document.getElementById('modal-title').textContent=r?'Editar revisión':'Nueva revisión';
  document.getElementById('modal-body').innerHTML=`
    <div class="fg"><label class="fl">Fecha</label><input class="fi" type="date" id="ff" value="${r?r.fecha:tod()}"></div>
    <div class="fg"><label class="fl">Kilómetros</label><input class="fi" type="number" id="fk" placeholder="5000" value="${r&&r.km?r.km:''}"></div>
    <div class="fg"><label class="fl">Taller</label><input class="fi" type="text" id="ft" value="${r?r.taller||'':''}"></div>
    <div class="fg"><label class="fl">Importe (€)</label><input class="fi" type="number" step="0.01" id="fp" placeholder="0,00" value="${r?r.precio:''}"></div>
    <div class="fg"><label class="fl">Observaciones <span style="color:var(--text3)">(opcional)</span></label><input class="fi" type="text" id="fn" value="${r?r.notas||'':''}"></div>
    <button class="btn-save" onclick="saveHondaRev()">Guardar</button>`;
  openModal();
}

function saveHondaRev(){
  const f=v('ff'),k=v('fk'),t=v('ft').trim(),p=parseFloat(v('fp')),n=v('fn').trim();
  if(!f||!p){alert('Fecha e importe son obligatorios.');return;}
  const obj={id:editId||nid(DH.revisiones),fecha:f,km:k?parseInt(k):'',taller:t,precio:p,notas:n};
  if(editId){const i=DH.revisiones.findIndex(x=>x.id===editId);if(i>=0)DH.revisiones[i]=obj;}
  else DH.revisiones.push(obj);
  dbSave();closeModal();render(curPage);
}
function editHondaRev(id){editId=id;showHondaRevForm(DH.revisiones.find(x=>x.id===id));}
function delHondaRev(id){if(!confirm('¿Borrar esta revisión?'))return;DH.revisiones=DH.revisiones.filter(x=>x.id!==id);dbSave();render(curPage);}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadData();
loadHondaData();

// Hide app chrome initially if no vehicle selected
if(!activeVehicle) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelector('.nav').style.display = 'none';
  document.querySelector('.fab').style.display = 'none';
} else {
  document.getElementById('vehicle-selector').style.display = 'none';
}

updateSelectorSync();
dbLoad();
</script>
