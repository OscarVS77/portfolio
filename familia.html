<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #000000;
    --surface:  #1A1A1A;
    --surface2: #242424;
    --border:   #2C2C2C;
    --border2:  #383838;
    --text:     #FFFFFF;
    --muted:    #8A8A8A;
    --muted2:   #5A5A5A;
    --accent:   #00C896;
    --red:      #FF3B30;
    --font:     'Inter', system-ui, sans-serif;
    --radius:   14px;
    --radius-sm:9px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:      #F8F8F8;
      --surface: #FFFFFF;
      --surface2:#F2F2F2;
      --border:  #E5E5E5;
      --border2: #D8D8D8;
      --text:    #1A1A1A;
      --muted:   #6C6C6C;
      --muted2:  #ABABAB;
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }

  /* LOCK SCREEN */
  .lock-screen {
    position:fixed; inset:0; background:#000000;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:9999; padding:40px 32px;
  }
  @media (prefers-color-scheme: light) { .lock-screen { background:#F8F8F8; } }
  .lock-title { font-size:10px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:#FFFFFF; margin-bottom:12px; }
  @media (prefers-color-scheme: light) { .lock-title { color:#1A1A1A; } }
  .lock-tagline { font-size:26px; font-weight:700; color:#FFFFFF; text-align:center; line-height:1.2; margin-bottom:6px; }
  @media (prefers-color-scheme: light) { .lock-tagline { color:#1A1A1A; } }
  .lock-sub { font-size:13px; color:#5A5A5A; text-align:center; margin-bottom:48px; }
  .lock-btn-primary {
    width:100%; max-width:300px; padding:16px; border-radius:12px;
    border:1px solid #FFD700; background:transparent; color:#FFD700;
    font-family:var(--font); font-size:13px; font-weight:700;
    letter-spacing:.12em; text-transform:uppercase; cursor:pointer;
  }
  @media (prefers-color-scheme: light) { .lock-btn-primary { border-color:#00C896; color:#00C896; } }
  .lock-back {
    margin-top:16px; background:none; border:none; color:#5A5A5A;
    font-family:var(--font); font-size:12px; cursor:pointer; letter-spacing:.04em;
  }

  /* PIN SCREEN */
  .pin-screen {
    position:fixed; inset:0; background:#000000;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    z-index:9999; padding:40px 32px;
  }
  @media (prefers-color-scheme: light) { .pin-screen { background:#F8F8F8; } }
  .pin-back { position:absolute; top:20px; left:20px; background:none; border:none; color:#8A8A8A; font-size:22px; cursor:pointer; padding:8px; }
  .pin-title { font-size:13px; font-weight:600; letter-spacing:.15em; text-transform:uppercase; color:#5A5A5A; margin-bottom:32px; }
  .pin-dots { display:flex; gap:14px; margin-bottom:40px; }
  .pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid #5A5A5A; background:transparent; transition:all .15s; }
  .pin-dot.filled { background:#FFD700; border-color:#FFD700; }
  @media (prefers-color-scheme: light) { .pin-dot.filled { background:#00C896; border-color:#00C896; } }
  .pin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:100%; max-width:280px; }
  .pin-key { padding:18px; border-radius:12px; border:1px solid #2C2C2C; background:#1A1A1A; color:#FFFFFF; font-family:var(--font); font-size:20px; font-weight:500; cursor:pointer; text-align:center; transition:background .1s; }
  .pin-key:active { background:#2C2C2C; }
  @media (prefers-color-scheme: light) { .pin-key { background:#FFFFFF; border-color:#E5E5E5; color:#1A1A1A; } .pin-key:active { background:#F2F2F2; } }
  .pin-key.del { font-size:16px; color:#8A8A8A; }
  .pin-error { color:#FF3B30; font-size:12px; font-family:var(--font); margin-top:16px; min-height:18px; }

  /* APP */
  #appContent { display:none; }
  .header {
    position:sticky; top:0; z-index:100;
    background:var(--bg); padding:12px 20px;
    border-bottom:1px solid var(--border);
  }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .header-title { font-size:10px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--text); }
  .header-date { font-size:10px; color:var(--text); }
  .tiles { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .tile { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; text-align:center; }
  .tile-label { font-size:9px; color:var(--text); letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; font-weight:400; }
  .tile-value { font-size:18px; font-weight:600; color:var(--text); }
  @media (prefers-color-scheme: dark) { .tile { background:transparent; } .tile-label { color:#FFFFFF; } }

  main { padding:16px 20px 80px; }

  /* PERSON SECTION */
  .person-section { margin-bottom:24px; }
  .person-header {
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:10px; padding-bottom:8px;
    border-bottom:2px solid var(--border);
  }
  .person-name { font-size:18px; font-weight:700; color:var(--text); }
  .person-total { font-size:14px; font-weight:500; color:var(--muted); }

  /* FUND CARD */
  .fund-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:14px 18px;
    margin-bottom:8px; cursor:pointer; transition:border-color .2s;
  }
  .fund-card:hover { border-color:var(--border2); }
  .fund-row1 { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .fund-name { font-size:15px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:7px; }
  .fund-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .fund-value { font-size:15px; font-weight:500; color:var(--text); }
  .fund-row2 { display:flex; justify-content:space-between; align-items:center; }
  .fund-ticker { font-size:11px; color:var(--muted2); }
  .fund-pct { font-size:15px; font-weight:500; }
  .pos { color:#00C896; }
  .neg { color:#FF3B30; }
  .fund-divider { height:.5px; background:var(--border); margin:10px 0; }
  .fund-stats { display:flex; justify-content:space-between; }
  .fund-stat-label { font-size:9px; color:var(--muted2); letter-spacing:.08em; text-transform:uppercase; margin-bottom:2px; }
  .fund-stat-value { font-size:14px; color:var(--text); }
  .fund-stat-value.pos { color:#00C896; }
  .fund-stat-value.neg { color:#FF3B30; }

  /* FAMILY TOTAL */
  .family-total-section {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:16px 18px; margin-bottom:24px;
  }
  .family-total-label { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted2); margin-bottom:12px; }
  .family-total-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .family-stat { }
  .family-stat-label { font-size:9px; color:var(--muted2); letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px; }
  .family-stat-value { font-size:16px; font-weight:600; color:var(--text); }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .25s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { width:100%; background:var(--surface); border-radius:14px 14px 0 0; border-top:1px solid var(--border); padding:24px 24px 40px; position:relative; max-height:90vh; overflow-y:auto; transform:translateY(100%); transition:transform .3s cubic-bezier(.34,1.56,.64,1); }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-handle { width:36px; height:4px; background:var(--border2); border-radius:2px; margin:0 auto 20px; }
  .modal-title { font-size:20px; font-weight:700; color:var(--text); margin-bottom:4px; }
  .modal-subtitle { font-size:12px; color:var(--muted); margin-bottom:24px; }
  .modal-section { margin-bottom:20px; }
  .modal-section-title { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted2); margin-bottom:6px; }
  .modal-section-desc { font-size:12px; color:var(--muted); margin-bottom:10px; line-height:1.5; }
  .input-row { display:flex; align-items:center; gap:0; border:1px solid var(--border2); border-radius:var(--radius-sm); overflow:hidden; }
  .input-currency { padding:14px; background:var(--surface2); color:var(--muted); font-size:14px; font-family:var(--font); border-right:1px solid var(--border2); }
  .amount-input { flex:1; padding:14px; background:transparent; border:none; color:var(--text); font-size:16px; font-family:var(--font); outline:none; }
  .modal-preview { font-size:12px; color:var(--accent); margin-top:8px; min-height:18px; }
  .btn-save { width:100%; padding:16px; background:var(--surface2); border:1px solid var(--accent); color:var(--accent); border-radius:var(--radius-sm); font-family:var(--font); font-size:13px; font-weight:700; letter-spacing:.08em; cursor:pointer; margin-top:8px; }
  .close-btn { position:absolute; top:16px; right:16px; background:var(--surface2); border:1px solid var(--border); color:var(--muted); width:30px; height:30px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

  /* TABS */
  .tabs { display:flex; gap:6px; padding:10px 20px; background:var(--bg); border-bottom:1px solid var(--border); }
  .tab { flex:1; padding:9px; border:1px solid var(--border); border-radius:var(--radius-sm); background:transparent; color:var(--muted); font-family:var(--font); font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; text-align:center; }
  .tab.active { background:var(--surface2); border-color:var(--border2); color:var(--text); }

  /* REBALANCEO */
  .rebal-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
  .rebal-header { font-size:10px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--muted2); margin-bottom:14px; }
  .rebal-action { display:flex; align-items:center; gap:8px; padding:12px 14px; background:rgba(0,200,150,0.06); border:1px solid rgba(0,200,150,0.15); border-radius:10px; margin-top:10px; }

  /* TOAST */
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface2); border:1px solid var(--border2); color:var(--text); padding:10px 20px; border-radius:20px; font-size:13px; font-family:var(--font); white-space:nowrap; opacity:0; transition:all .3s; pointer-events:none; z-index:300; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width:0; }
</style>
</head>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const PIN = '06281406';
const SUPABASE_URL = 'https://kxqehlutocvdjfgmbdep.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cWVobHV0b2N2ZGpmZ21iZGVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODI2MTAsImV4cCI6MjA4OTc1ODYxMH0.MEj0wMuG9Vu6NKurtO2g_3TSqE7ITzzapSPkXMWO0jQ';

// Colors matching portfolio.html
const COLOR_WORLD    = '#C0394B';
const COLOR_EMERGING = '#5BA4E8';

// ─── DEFAULT DATA ────────────────────────────────────────────────────────────
const DEFAULT_DATA = [
  {
    person: 'Pai',
    funds: [
      { id: 'pai_world',    name: 'MSCI World',  ticker: 'FMWO',  color: COLOR_WORLD,    invested: 403.44, currentPrice: 399.61, note: 'IE00BYX5NX33 · Fidelity MSCI World P-ACC-EUR · MyInvestor' },
      { id: 'pai_emerging', name: 'Emergentes',  ticker: 'VFEM',  color: COLOR_EMERGING, invested: 55.07,  currentPrice: 58.64,  note: 'IE0031786696 · Vanguard Emerging Markets EUR Acc · MyInvestor' },
    ]
  },
  {
    person: 'Abril',
    funds: [
      { id: 'abril_world',    name: 'MSCI World',  ticker: 'FMWO',  color: COLOR_WORLD,    invested: 435.15, currentPrice: 425.19, note: 'IE00BYX5NX33 · Fidelity MSCI World P-ACC-EUR · MyInvestor' },
      { id: 'abril_emerging', name: 'Emergentes',  ticker: 'VFEM',  color: COLOR_EMERGING, invested: 102.93, currentPrice: 108.18, note: 'IE0031786696 · Vanguard Emerging Markets EUR Acc · MyInvestor' },
    ]
  },
  {
    person: 'Júna',
    funds: [
      { id: 'juna_world',    name: 'MSCI World',  ticker: 'FMWO',  color: COLOR_WORLD,    invested: 435.15, currentPrice: 425.19, note: 'IE00BYX5NX33 · Fidelity MSCI World P-ACC-EUR · MyInvestor' },
      { id: 'juna_emerging', name: 'Emergentes',  ticker: 'VFEM',  color: COLOR_EMERGING, invested: 102.93, currentPrice: 108.18, note: 'IE0031786696 · Vanguard Emerging Markets EUR Acc · MyInvestor' },
    ]
  }
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let familyData = [];
let selectedFundId = null;
let pinBuffer = '';

// ─── SUPABASE ────────────────────────────────────────────────────────────────
async function dbLoad() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/familia_state?id=eq.familia&select=data`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const rows = await r.json();
  if (rows.length && rows[0].data && Array.isArray(rows[0].data)) return rows[0].data;
  return null;
}

async function dbSave(data) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/familia_state?id=eq.familia`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ data, updated_at: new Date().toISOString() })
    });
  } catch(e) {}
}

// ─── STATE MANAGEMENT ────────────────────────────────────────────────────────
function mergeData(saved) {
  familyData = DEFAULT_DATA.map(person => ({
    person: person.person,
    funds: person.funds.map(fund => {
      const s = saved.find(x => x.id === fund.id) || {};
      return {
        ...fund,
        invested:      s.invested      ?? fund.invested,
        currentPrice:  s.currentPrice  ?? fund.currentPrice,
      };
    })
  }));
}

function flatFunds() {
  return familyData.flatMap(p => p.funds);
}

function saveState() {
  const toSave = flatFunds().map(f => ({ id: f.id, invested: f.invested, currentPrice: f.currentPrice }));
  localStorage.setItem('familia_v1', JSON.stringify(toSave));
  dbSave(toSave);
}

function loadState() {
  try {
    const saved = localStorage.getItem('familia_v1');
    if (saved) { mergeData(JSON.parse(saved)); return; }
  } catch(e) {}
  familyData = DEFAULT_DATA.map(p => ({ ...p, funds: p.funds.map(f => ({...f})) }));
}

// ─── FORMATTING ──────────────────────────────────────────────────────────────
function fmt(n, d=2) {
  return new Intl.NumberFormat('es-ES', { minimumFractionDigits:d, maximumFractionDigits:d }).format(n);
}
function fmtEur(n, d=2) { return fmt(n, d) + ' €'; }
function fmtPct(n) {
  const arrow = n >= 0 ? '▲ ' : '▼ ';
  return arrow + fmt(Math.abs(n), 2) + '%';
}
function pnlColor(n) { return n >= 0 ? 'var(--accent)' : 'var(--red)'; }

// ─── RENDER ──────────────────────────────────────────────────────────────────
let activeTab = 'activos';

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['activos','rebalanceo'][i] === tab);
  });
  renderMain();
}

function render() {
  updateHeader();
  renderMain();
  updateDate();
}

function renderMain() {
  if (activeTab === 'activos') renderPersons();
  else renderRebalanceo();
}

function renderRebalanceo() {
  const THRESHOLD = 5;
  const main = document.getElementById('mainContent');

  const html = familyData.map(person => {
    const world    = person.funds.find(f => f.id.includes('world'));
    const emerging = person.funds.find(f => f.id.includes('emerging'));
    const total    = world.currentPrice + emerging.currentPrice;
    const worldPct    = total > 0 ? (world.currentPrice / total) * 100 : 0;
    const emergingPct = total > 0 ? (emerging.currentPrice / total) * 100 : 0;
    const worldDiff    = worldPct - 80;
    const emergingDiff = emergingPct - 20;
    const inRange = Math.abs(worldDiff) <= THRESHOLD;

    function bar(asset, actual, target) {
      const diff = actual - target;
      const diffColor = Math.abs(diff) <= THRESHOLD ? 'var(--muted2)' : (diff > 0 ? 'var(--red)' : 'var(--accent)');
      return `
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
            <div style="display:flex;align-items:center;gap:7px">
              <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${asset.color}"></span>
              <span style="font-size:14px;font-weight:600;color:var(--text)">${asset.name}</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:13px;color:var(--text);font-weight:500">${fmt(actual,1)}%</span>
              <span style="font-size:12px;color:var(--muted2)">/ ${target}%</span>
              <span style="font-size:13px;font-weight:600;color:${diffColor}">${diff>=0?'+':''}${fmt(diff,1)}%</span>
            </div>
          </div>
          <div style="position:relative;height:7px;background:var(--border);border-radius:4px;overflow:hidden">
            <div style="position:absolute;left:0;top:0;height:100%;width:${Math.min(actual,100)}%;background:${asset.color};border-radius:4px;transition:width .5s"></div>
          </div>
          <div style="position:relative;height:3px;background:transparent;margin-top:2px">
            <div style="position:absolute;left:0;top:0;height:3px;width:${Math.min(target,100)}%;background:${asset.color};opacity:.3;border-radius:2px"></div>
            <div style="position:absolute;top:-2px;left:${Math.min(target,100)}%;transform:translateX(-50%);width:2px;height:7px;background:${asset.color};opacity:.7;border-radius:1px"></div>
          </div>
        </div>`;
    }

    const actionHtml = inRange
      ? `<div class="rebal-action"><span style="color:var(--accent);font-size:14px">✓</span><span style="font-size:13px;color:var(--accent);font-weight:600">Equilibrado. No es necesario actuar.</span></div>`
      : `<div class="rebal-action" style="background:rgba(255,59,48,0.06);border-color:rgba(255,59,48,0.2)">
           <span style="color:var(--red);font-size:14px">↻</span>
           <span style="font-size:13px;color:var(--red);font-weight:600">Reajustar: prioriza ${worldDiff < -THRESHOLD ? 'MSCI World' : 'Emergentes'} en próxima aportación</span>
         </div>`;

    return `
      <div class="rebal-card">
        <div class="rebal-header">${person.person}</div>
        ${bar(world, worldPct, 80)}
        ${bar(emerging, emergingPct, 20)}
        ${actionHtml}
      </div>`;
  }).join('');

  main.innerHTML = `<div style="padding-top:12px">${html}</div>`;
}

function updateHeader() {
  let totalInv = 0, totalCur = 0;
  flatFunds().forEach(f => { totalInv += f.invested; totalCur += f.currentPrice; });
  const pnlAbs = totalCur - totalInv;
  const pnlPct = totalInv > 0 ? (pnlAbs / totalInv) * 100 : 0;
  const pc = pnlColor(pnlAbs);

  document.getElementById('hTotalInv').textContent = fmtEur(totalInv, 0);
  document.getElementById('hTotalCur').textContent = fmtEur(totalCur, 0);
  const absEl = document.getElementById('hPnlAbs');
  absEl.textContent = fmtEur(pnlAbs);
  absEl.style.color = pc;
  const pctEl = document.getElementById('hPnlPct');
  pctEl.textContent = fmtPct(pnlPct);
  pctEl.style.color = pc;
}

function renderPersons() {
  const main = document.getElementById('mainContent');
  main.innerHTML = familyData.map(person => {
    const totalInv = person.funds.reduce((s, f) => s + f.invested, 0);
    const totalCur = person.funds.reduce((s, f) => s + f.currentPrice, 0);
    const pnlAbs = totalCur - totalInv;
    const pnlPct = totalInv > 0 ? (pnlAbs / totalInv) * 100 : 0;

    const fundsHtml = person.funds.map(f => {
      const pnl = f.currentPrice - f.invested;
      const pct = f.invested > 0 ? (pnl / f.invested) * 100 : 0;
      const pc = pnl >= 0 ? 'pos' : 'neg';
      return `
        <div class="fund-card" onclick="openModal('${f.id}')">
          <div class="fund-row1">
            <div class="fund-name">
              <span class="fund-dot" style="background:${f.color}"></span>
              ${f.name}
            </div>
            <span style="font-size:15px;font-weight:500;color:var(--text)">${fmtEur(f.currentPrice)}</span>
          </div>
          <div class="fund-row2">
            <span class="fund-ticker">${f.ticker}</span>
            <span class="fund-pct ${pc}">${fmtPct(pct)}</span>
          </div>
          <div class="fund-divider"></div>
          <div class="fund-stats">
            <div>
              <div class="fund-stat-label">Invertido</div>
              <div class="fund-stat-value">${fmtEur(f.invested)}</div>
            </div>
            <div style="text-align:right">
              <div class="fund-stat-label">P&L</div>
              <div class="fund-stat-value ${pc}">${fmtEur(pnl)}</div>
            </div>
          </div>
          <div style="margin-top:8px;font-size:10px;color:var(--muted2)">${f.note}</div>
        </div>`;
    }).join('');

    return `
      <div class="person-section">
        <div class="person-header">
          <span class="person-name">${person.person}</span>
          <span class="person-total" style="color:${pnlColor(pnlAbs)}">${fmtPct(pnlPct)} · ${fmtEur(totalCur)}</span>
        </div>
        ${fundsHtml}
      </div>`;
  }).join('');
}

function updateDate() {
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(fundId) {
  selectedFundId = fundId;
  const fund = flatFunds().find(f => f.id === fundId);
  if (!fund) return;

  document.getElementById('modalTitle').textContent = fund.name;
  document.getElementById('modalSubtitle').textContent = fund.note.split(' · ')[2] || 'MyInvestor';
  document.getElementById('inputInvested').value = fmt(fund.invested, 2).replace('.', ',');
  document.getElementById('inputCurrent').value = fmt(fund.currentPrice, 2).replace('.', ',');

  const pnl = fund.currentPrice - fund.invested;
  const pct = fund.invested > 0 ? (pnl / fund.invested) * 100 : 0;
  document.getElementById('modalPreview').textContent = `P&L: ${fmtEur(pnl)} · ${fmtPct(pct)}`;

  document.getElementById('inputCurrent').oninput = function() {
    const val = parseFloat(this.value.replace(',', '.'));
    const inv = parseFloat(document.getElementById('inputInvested').value.replace(',', '.')) || fund.invested;
    if (!isNaN(val) && inv) {
      const p = val - inv;
      const pc = (p / inv) * 100;
      document.getElementById('modalPreview').textContent = `P&L: ${fmtEur(p)} · ${fmtPct(pc)}`;
    }
  };

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

function saveModal() {
  if (!selectedFundId) return;
  const fund = flatFunds().find(f => f.id === selectedFundId);
  if (!fund) return;

  const inv = parseFloat(document.getElementById('inputInvested').value.replace(',', '.'));
  const cur = parseFloat(document.getElementById('inputCurrent').value.replace(',', '.'));

  if (!isNaN(inv) && inv > 0) fund.invested = inv;
  if (!isNaN(cur) && cur > 0) fund.currentPrice = cur;

  saveState();
  document.getElementById('modalOverlay').classList.remove('open');
  showToast(`${fund.name} actualizado`);
  render();
}

// ─── PIN ─────────────────────────────────────────────────────────────────────
function showLockScreen() {
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('pinScreen').style.display = 'none';
  document.getElementById('appContent').style.display = 'none';
  pinBuffer = '';
  updateDots();
}

function showPinScreen() {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('pinScreen').style.display = 'flex';
  pinBuffer = '';
  updateDots();
  document.getElementById('pinError').textContent = '';
}

function enterApp() {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('pinScreen').style.display = 'none';
  document.getElementById('appContent').style.display = 'block';
  render();
}

function pinPress(digit) {
  if (pinBuffer.length >= 8) return;
  pinBuffer += digit;
  updateDots();
  if (pinBuffer.length === 8) {
    if (pinBuffer === PIN) {
      document.getElementById('pinError').textContent = '';
      enterApp();
    } else {
      document.getElementById('pinError').textContent = 'PIN incorrecto';
      setTimeout(() => { pinBuffer = ''; updateDots(); document.getElementById('pinError').textContent = ''; }, 800);
    }
  }
}

function pinDel() { pinBuffer = pinBuffer.slice(0, -1); updateDots(); }
function updateDots() {
  for (let i = 0; i < 8; i++) document.getElementById('d' + i).classList.toggle('filled', i < pinBuffer.length);
}

document.addEventListener('keydown', e => {
  if (document.getElementById('pinScreen').style.display !== 'flex') return;
  if (e.key >= '0' && e.key <= '9') pinPress(e.key);
  else if (e.key === 'Backspace') pinDel();
  else if (e.key === 'Escape') showLockScreen();
});

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  let loaded = false;
  try {
    const remote = await dbLoad();
    if (remote && remote.length) {
      mergeData(remote);
      localStorage.setItem('familia_v1', JSON.stringify(remote));
      loaded = true;
    }
  } catch(e) {}
  if (!loaded) loadState();
}

init();
</script>
</body>
</html>
